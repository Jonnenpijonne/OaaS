# This workflow builds the Java/Maven project only when Java project files change.
# Documentation-only portfolio updates are intentionally ignored.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
    paths:
      - "pom.xml"
      - "mvnw"
      - ".mvn/**"
      - "class-runtime-manager/**"
      - "cli/**"
      - "common/**"
      - "invoker/**"
      - "package-manager/**"
      - "example/functions/**"
      - ".github/workflows/maven.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "pom.xml"
      - "mvnw"
      - ".mvn/**"
      - "class-runtime-manager/**"
      - "cli/**"
      - "common/**"
      - "invoker/**"
      - "package-manager/**"
      - "example/functions/**"
      - ".github/workflows/maven.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
